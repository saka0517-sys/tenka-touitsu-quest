<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天下統一クエスト〜社会編〜</title>
<style>
  :root{
    --bg:#f3efe4; --card:#fffdf7; --ink:#2b2622; --sub:#7a6f5e;
    --accent:#8a1f1f; --accent2:#c0392b; --good:#2f6e3a; --bad:#8a1f1f;
    --line:#e6dcc4; --gold:#b9892c;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif; background:var(--bg); color:var(--ink); -webkit-tap-highlight-color:transparent;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 24px;}
  header{padding:16px 16px 10px; position:sticky; top:0; background:var(--bg); z-index:5;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .logo{font-size:17px;font-weight:700;letter-spacing:0.02em;}
  .stats{display:flex;gap:10px;font-size:13px;color:var(--sub);}
  .stat-pill{background:var(--card);border:0.5px solid var(--line);border-radius:20px;padding:5px 10px;display:flex;align-items:center;gap:4px;}
  .xpbar-wrap{background:var(--card);border-radius:20px;height:10px;overflow:hidden;border:0.5px solid var(--line);}
  .xpbar{height:100%;background:linear-gradient(90deg,var(--gold),#e3b94f);width:0%;transition:width .4s;}
  .screen{padding:0 16px;flex:1;display:none;}
  .screen.active{display:block;}

  .rank-box{display:flex;align-items:center;gap:10px;background:var(--card);border:0.5px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px;}
  .rank-emoji{font-size:38px;line-height:1;transition:transform .3s;}
  .rank-emoji.bump{transform:scale(1.3) rotate(-8deg);}
  .rank-info{flex:1;}
  .rank-info .rank-name{font-size:13px;font-weight:700;}
  .rank-info .rank-stage{font-size:11px;color:var(--sub);margin-top:2px;}
  .rank-info .rank-bar-wrap{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:5px;border:0.5px solid var(--line);}
  .rank-info .rank-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .4s;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .level-card{background:var(--card);border:0.5px solid var(--line);border-radius:14px;padding:14px 12px;text-align:left;position:relative;}
  .level-card .ic{font-size:24px;margin-bottom:6px;display:block;}
  .level-card .name{font-weight:600;font-size:15px;margin-bottom:2px;}
  .level-card .meta{font-size:12px;color:var(--sub);}
  .level-card .acc{position:absolute;top:10px;right:10px;font-size:11px;font-weight:500;background:#f3e6c8;color:var(--gold);padding:2px 7px;border-radius:10px;}
  .section-title{font-size:13px;color:var(--sub);margin:18px 0 8px;font-weight:600;}
  .wide-btn{width:100%;background:var(--card);border:0.5px solid var(--line);border-radius:14px;padding:14px;text-align:left;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px;}
  .badge-count{background:#fcebeb;color:var(--bad);font-size:12px;padding:2px 8px;border-radius:10px;font-weight:500;}

  .quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .qcounter{font-size:13px;color:var(--sub);}
  .timer{font-size:13px;font-weight:600;color:var(--accent);}
  .timer.danger{color:var(--bad);}
  .progress-track{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:18px;}
  .progress-fill{height:100%;background:var(--gold);width:0%;transition:width .3s;}
  .qcard{background:var(--card);border:0.5px solid var(--line);border-radius:16px;padding:22px 18px;margin-bottom:16px;min-height:90px;display:flex;align-items:center;}
  .qtext{font-size:17px;line-height:1.5;font-weight:600;}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice-btn{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:14px 16px;font-size:15px;text-align:left;display:flex;align-items:center;gap:10px;}
  .choice-btn .lt{width:24px;height:24px;border-radius:50%;background:var(--bg);border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:var(--sub);}
  .choice-btn.correct{background:#e7f3e2;border-color:#4c8a2e;}
  .choice-btn.correct .lt{background:#4c8a2e;color:#fff;border-color:#4c8a2e;}
  .choice-btn.wrong{background:#fbe6e2;border-color:var(--accent2);}
  .choice-btn.wrong .lt{background:var(--accent2);color:#fff;border-color:var(--accent2);}
  .choice-btn:disabled{opacity:0.85;}

  .feedback-bar{margin-top:14px;padding:12px 14px;border-radius:12px;font-size:14px;display:none;align-items:center;justify-content:space-between;}
  .feedback-bar.show{display:flex;}
  .feedback-bar.ok{background:#e7f3e2;color:#234d18;}
  .feedback-bar.ng{background:#fbe6e2;color:#7a1f1f;}
  .next-btn{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;}

  .combo-pop{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s, transform .2s; pointer-events:none; z-index:150;}
  .combo-pop.show{opacity:1;transform:translateX(-50%) translateY(6px);}

  .boss-banner{background:linear-gradient(90deg,#3a2a14,#8a1f1f);color:#f3e6c8;padding:10px 14px;border-radius:12px;text-align:center;font-weight:700;margin-bottom:10px;display:none;font-size:14px;letter-spacing:0.03em;}
  .boss-banner.show{display:block;animation:bossPulse .5s;}
  @keyframes bossPulse{0%{transform:scale(0.85);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .qcard.boss{border:1.5px solid var(--accent);background:linear-gradient(180deg,#fffdf7,#fbe9d8);}

  .float-score{position:fixed;font-size:20px;font-weight:700;color:var(--good);pointer-events:none;z-index:150;animation:floatUp 1s forwards;left:50%;top:46%;}
  @keyframes floatUp{0%{opacity:1;transform:translate(-50%,0) scale(1);}100%{opacity:0;transform:translate(-50%,-70px) scale(1.15);}}

  .confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:200;}

  .result-hero{text-align:center;padding:30px 0 10px;}
  .result-hero .big{font-size:40px;font-weight:700;margin-bottom:4px;}
  .result-hero .label{font-size:14px;color:var(--sub);}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0;}
  .metric-card{background:var(--card);border-radius:12px;padding:14px;text-align:center;border:0.5px solid var(--line);}
  .metric-card .v{font-size:22px;font-weight:700;}
  .metric-card .l{font-size:12px;color:var(--sub);margin-top:2px;}
  .badge-unlock{background:#f3e6c8;border:0.5px solid var(--gold);border-radius:12px;padding:12px 14px;font-size:13px;color:#5a4112;margin-bottom:10px;display:flex;align-items:center;gap:8px;}

  button{cursor:pointer;font-family:inherit;}
  .btn-row{display:flex;gap:10px;}
  .primary-btn{flex:1;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;}
  .ghost-btn{flex:1;background:var(--card);color:var(--ink);border:0.5px solid var(--line);border-radius:12px;padding:14px;font-size:15px;}
  .empty-note{font-size:13px;color:var(--sub);text-align:center;padding:30px 10px;}
  .back-link{font-size:13px;color:var(--sub);margin-bottom:10px;display:inline-block;}

  .collection-card{position:relative;}
  .collection-card .count-badge{position:absolute;top:10px;right:10px;font-size:11px;font-weight:500;background:#f3e6c8;color:var(--gold);padding:2px 7px;border-radius:10px;}
  .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .word-card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 4px 8px;text-align:center;font-size:11px;}
  .word-card .wc-ic{font-size:20px;display:block;margin-bottom:3px;}
  .word-card .wc-word{font-weight:600;font-size:10.5px;word-break:break-all;}
  .word-card.common{border-color:#c9b98f;}
  .word-card.rare{border-color:#5b8def;background:#eef4ff;}
  .word-card.legendary{border-color:var(--gold);background:#fff3da;}
  .word-card .wc-dup{font-size:10px;color:var(--sub);}
  .collection-summary{display:flex;gap:10px;margin-bottom:14px;}
  .collection-summary .metric-card{flex:1;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="topbar">
      <div class="logo">天下統一クエスト</div>
      <div class="stats">
        <div class="stat-pill">🔥<span id="streakNum">0</span></div>
        <div class="stat-pill">Lv<span id="levelNum">1</span></div>
      </div>
    </div>
    <div class="xpbar-wrap"><div class="xpbar" id="xpbar"></div></div>
  </header>

  <div class="screen active" id="screen-home">
    <div class="rank-box" id="rankBox">
      <span class="rank-emoji" id="rankEmoji">🗡️</span>
      <div class="rank-info">
        <div class="rank-name" id="rankName">足軽</div>
        <div class="rank-stage" id="rankStage">天下統一への道は長い…</div>
        <div class="rank-bar-wrap"><div class="rank-bar" id="rankBar"></div></div>
      </div>
    </div>

    <div class="section-title">復習</div>
    <button class="wide-btn" id="reviewBtn" onclick="startReview()">
      <span>❗ 間違えた問題を復習する</span>
      <span class="badge-count" id="reviewCount">0</span>
    </button>

    <div class="section-title">出陣する国(レベルを選ぶ)</div>
    <div class="grid" id="levelGrid"></div>

    <div class="section-title">特集</div>
    <div class="grid">
      <button class="level-card" onclick="startQuiz('all')">
        <span class="ic">🌏</span>
        <div class="name">天下統一戦</div>
        <div class="meta">全範囲から出題</div>
      </button>
      <button class="level-card" onclick="startQuiz('weak')">
        <span class="ic">🎯</span>
        <div class="name">苦手集中</div>
        <div class="meta">正答率が低い問題</div>
      </button>
    </div>

    <div class="section-title">仲間武将</div>
    <button class="wide-btn collection-card" onclick="openCollection()">
      <span>⚔️ 仲間武将一覧</span>
      <span class="count-badge" id="collectionCount">0種</span>
    </button>

    <div class="section-title">武功(実績)</div>
    <div class="grid" id="badgeGrid"></div>
  </div>

  <div class="screen" id="screen-quiz">
    <a class="back-link" onclick="confirmExit()">← 退却してレベル選択へ戻る</a>
    <div class="quiz-head">
      <div class="qcounter" id="qcounter">1 / 10</div>
      <div class="timer" id="timer">12</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="boss-banner" id="bossBanner">⚔️ 合戦!勝利で大量の武功とレア武将!</div>
    <div class="qcard" id="qcard"><div class="qtext" id="qtext"></div></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-bar" id="feedbackBar">
      <span id="feedbackText"></span>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次へ →</button>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-hero">
      <div class="big" id="resultScore">0/10</div>
      <div class="label">正答率 <span id="resultAcc">0%</span></div>
    </div>
    <div id="badgeUnlockArea"></div>
    <div class="result-grid">
      <div class="metric-card"><div class="v" id="resultXp">+0</div><div class="l">獲得武功</div></div>
      <div class="metric-card"><div class="v" id="resultCombo">0</div><div class="l">最大連勝</div></div>
    </div>
    <div class="btn-row">
      <button class="ghost-btn" onclick="goHome()">レベル選択へ</button>
      <button class="primary-btn" id="retryBtn" onclick="retrySame()">もう一度</button>
    </div>
  </div>

  <div class="screen" id="screen-collection">
    <a class="back-link" onclick="goHome()">← ホームへ戻る</a>
    <div class="result-hero" style="padding-top:6px;">
      <div class="big" id="collectionBig">0種</div>
      <div class="label">仲間にした武将の種類</div>
    </div>
    <div class="collection-summary">
      <div class="metric-card"><div class="v" id="collCommon">0</div><div class="l">雑兵級</div></div>
      <div class="metric-card"><div class="v" id="collRare">0</div><div class="l">武将級</div></div>
      <div class="metric-card"><div class="v" id="collLegend">0</div><div class="l">大名級</div></div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>
</div>
<div class="combo-pop" id="comboPop"></div>
<canvas class="confetti-canvas" id="confettiCanvas"></canvas>

<script>

/* ====================== 状態管理 ====================== */
const STORAGE_KEY = "tenkaQuestState_v1";
let state = loadState();
function loadState(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return { xp:0, level:1, streak:0, levelStats:{}, qStats:{}, wrongPool:[], badges:[], collection:{} };
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function xpForLevel(lv){ return 50 * lv; }
function addXp(amount){
  state.xp += amount;
  let need = xpForLevel(state.level);
  while(state.xp >= need){
    state.xp -= need; state.level += 1; need = xpForLevel(state.level);
    unlockBadge("level"+state.level, `レベル${state.level}に到達!`);
    setTimeout(()=>confettiBurst(true), 150);
  }
  saveState(); renderHeader();
}
const BADGE_DEFS = {
  "first_quiz":"初陣を制す","level2":"レベル2に到達!","level5":"レベル5に到達!","level10":"レベル10に到達!",
  "combo5":"5連勝!","combo10":"10連勝!","perfect":"完全勝利(全問正解)",
  "lv1_master":"地理マスター(80問正解)","lv2_master":"中世史マスター(80問正解)","lv3_master":"近代史マスター(80問正解)",
};
let newlyUnlocked = [];
function unlockBadge(key, label){
  if(!state.badges.includes(key)){ state.badges.push(key); newlyUnlocked.push(label || BADGE_DEFS[key] || key); saveState(); }
}
function getLevelStat(lv){ if(!state.levelStats[lv]) state.levelStats[lv]={correct:0,total:0}; return state.levelStats[lv]; }
function getQStat(q){ if(!state.qStats[q]) state.qStats[q]={correct:0,wrong:0}; return state.qStats[q]; }

function renderHeader(){
  document.getElementById("levelNum").textContent = state.level;
  document.getElementById("streakNum").textContent = state.streak;
  const need = xpForLevel(state.level);
  document.getElementById("xpbar").style.width = Math.min(100, (state.xp/need)*100) + "%";
  renderRank();
}

/* ===== 身分(階級)成長 ===== */
const RANKS = [
  {min:1,  emoji:"🪖", name:"足軽"},
  {min:3,  emoji:"⚔️", name:"武士"},
  {min:6,  emoji:"🛡️", name:"武将"},
  {min:10, emoji:"🏯", name:"大名"},
  {min:15, emoji:"👑", name:"天下人"},
];
function getRank(level){
  let cur = RANKS[0];
  for(const r of RANKS){ if(level>=r.min) cur=r; }
  return cur;
}
function renderRank(){
  const rank = getRank(state.level);
  const el = document.getElementById("rankEmoji");
  if(el){
    el.textContent = rank.emoji;
    document.getElementById("rankName").textContent = rank.name + "(Lv." + state.level + ")";
    const need = xpForLevel(state.level);
    document.getElementById("rankBar").style.width = Math.min(100, (state.xp/need)*100) + "%";
  }
}
function bumpRank(){
  const el = document.getElementById("rankEmoji");
  if(!el) return;
  el.classList.add("bump");
  setTimeout(()=>el.classList.remove("bump"), 300);
}

/* ===== 紙吹雪(陣幕の旗が舞うイメージ:金・赤・黒) ===== */
function confettiBurst(big){
  const canvas = document.getElementById("confettiCanvas");
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext("2d");
  const colors = ["#b9892c","#8a1f1f","#2b2622","#e3b94f","#c0392b"];
  const count = big ? 90 : 26;
  const particles = Array.from({length:count}, ()=>({
    x: canvas.width/2 + (Math.random()-0.5)*120,
    y: canvas.height*0.35,
    vx: (Math.random()-0.5)* (big?9:5),
    vy: Math.random()*-6 - (big?5:2),
    size: Math.random()*6+4,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*360,
    vr: (Math.random()-0.5)*10,
  }));
  let frame = 0;
  const maxFrames = big ? 90 : 55;
  function tick(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.vy += 0.18; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame/maxFrames);
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      ctx.restore();
    });
    if(frame < maxFrames){ requestAnimationFrame(tick); }
    else { ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  tick();
}

const RARITY_BY_LEVEL = {1:"common", 2:"rare", 3:"legendary"};
function rollAlly(rarity){
  const pool = ALLY_ROSTER[rarity];
  return pool[Math.floor(Math.random()*pool.length)];
}
function addAlly(rarity){
  const [name, icon] = rollAlly(rarity);
  const key = rarity+":"+name;
  if(!state.collection[key]) state.collection[key] = {name, icon, rarity, count:0};
  state.collection[key].count++;
  saveState();
  return state.collection[key];
}
function openCollection(){ showScreen("collection"); renderCollection(); }
function renderCollection(){
  const entries = Object.values(state.collection);
  document.getElementById("collectionBig").textContent = `${entries.length}種`;
  document.getElementById("collectionCount").textContent = `${entries.length}種`;
  const counts = {common:0, rare:0, legendary:0};
  entries.forEach(c=>counts[c.rarity]++);
  document.getElementById("collCommon").textContent = counts.common;
  document.getElementById("collRare").textContent = counts.rare;
  document.getElementById("collLegend").textContent = counts.legendary;

  const grid = document.getElementById("cardGrid");
  grid.innerHTML = "";
  if(entries.length===0){
    grid.innerHTML = `<div class="empty-note" style="grid-column:1/5;">クイズに正解して仲間を増やそう</div>`;
    return;
  }
  const order = {legendary:0, rare:1, common:2};
  entries.sort((a,b)=>order[a.rarity]-order[b.rarity]);
  entries.forEach(c=>{
    const div = document.createElement("div");
    div.className = "word-card " + c.rarity;
    div.innerHTML = `<span class="wc-ic">${c.icon}</span><span class="wc-word">${c.name}</span><div class="wc-dup">×${c.count}</div>`;
    grid.appendChild(div);
  });
}

/* ====================== クイズロジック ====================== */
let session = null;
let timerInterval = null;
let answered = false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildQuestionSet(target, count){
  let pool;
  if(target==="all"){ pool = QBANK; }
  else if(target==="weak"){
    pool = QBANK.filter(q=>{ const s=getQStat(q[0]); return s.wrong>0 && s.wrong>=s.correct; });
    if(pool.length < 5) pool = QBANK;
  } else {
    pool = QBANK.filter(q=>q[3]===target);
  }
  return shuffle(pool).slice(0, Math.min(count, pool.length));
}

function startQuiz(target){
  const qs = buildQuestionSet(target, 10);
  session = {target, questions:qs, idx:0, correctCount:0, maxCombo:0, combo:0, mode:"normal"};
  showScreen("quiz"); renderQuestion();
}
function startReview(){
  if(state.wrongPool.length===0) return;
  const qs = state.wrongPool.map(w=>[w.q, w.choices, w.ansIdx, w.lv]);
  session = {target:"review", questions:qs, idx:0, correctCount:0, maxCombo:0, combo:0, mode:"review"};
  showScreen("quiz"); renderQuestion();
}
function retrySame(){ if(session.mode==="review"){ startReview(); } else { startQuiz(session.target); } }
function showScreen(name){
  document.querySelectorAll(".screen").forEach(el=>el.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
}

function renderQuestion(){
  answered = false;
  clearInterval(timerInterval);
  const total = session.questions.length;
  document.getElementById("qcounter").textContent = `${session.idx+1} / ${total}`;
  document.getElementById("progressFill").style.width = (session.idx/total*100)+"%";
  const [qtext, rawChoices, rawAnsIdx] = session.questions[session.idx];
  const order = shuffle([0,1,2,3]);
  const choices = order.map(i=>rawChoices[i]);
  const ansIdx = order.indexOf(rawAnsIdx);
  session.questions[session.idx] = [qtext, choices, ansIdx, session.questions[session.idx][3]];
  document.getElementById("qtext").textContent = qtext;

  const isBoss = (session.idx === total-1) && total>=5 && session.mode!=="review";
  session.isBoss = isBoss;
  const banner = document.getElementById("bossBanner");
  const qcardEl = document.getElementById("qcard");
  if(isBoss){
    const bossName = BOSS_NAMES[Math.floor(Math.random()*BOSS_NAMES.length)];
    banner.textContent = `⚔️ 合戦「${bossName}」!勝利で大量の武功とレア武将!`;
  }
  banner.classList.toggle("show", isBoss);
  qcardEl.classList.toggle("boss", isBoss);

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  const labels = ["A","B","C","D"];
  choices.forEach((c, i)=>{
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="lt">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = ()=>selectAnswer(i, ansIdx, qtext, choices);
    choicesEl.appendChild(btn);
  });

  document.getElementById("feedbackBar").classList.remove("show","ok","ng");

  let timeLeft = isBoss ? 18 : 12;
  const timerEl = document.getElementById("timer");
  timerEl.textContent = timeLeft; timerEl.classList.remove("danger");
  timerInterval = setInterval(()=>{
    timeLeft--; timerEl.textContent = timeLeft;
    if(timeLeft<=5) timerEl.classList.add("danger");
    if(timeLeft<=0){ clearInterval(timerInterval); if(!answered) selectAnswer(-1, ansIdx, qtext, choices); }
  }, 1000);
}

function selectAnswer(chosenIdx, ansIdx, qtext, choices){
  if(answered) return;
  answered = true;
  clearInterval(timerInterval);
  const allBtns = document.querySelectorAll(".choice-btn");
  allBtns.forEach(b=>b.disabled = true);
  const isCorrect = chosenIdx === ansIdx;

  if(allBtns[ansIdx]) allBtns[ansIdx].classList.add("correct");
  if(!isCorrect && chosenIdx>=0 && allBtns[chosenIdx]) allBtns[chosenIdx].classList.add("wrong");

  const fb = document.getElementById("feedbackBar");
  const fbText = document.getElementById("feedbackText");
  fb.classList.add("show");
  const lv = session.questions[session.idx][3];
  const qstat = getQStat(qtext);
  const isBoss = session.isBoss;

  if(isCorrect){
    fb.classList.add("ok"); fb.classList.remove("ng");
    session.combo++; session.maxCombo = Math.max(session.maxCombo, session.combo);
    session.correctCount++;
    state.streak++;
    qstat.correct++;
    let bonus = session.combo>=10?20:session.combo>=5?12:5;
    if(isBoss) bonus *= 3;
    fbText.textContent = (isBoss? "🏆 合戦勝利!" : "正解!") + `(+${bonus}武功)` + (session.combo>=3?` 🔥${session.combo}連勝!`:"");
    addXp(bonus);
    spawnFloatScore("+"+bonus);
    bumpRank();
    confettiBurst(isBoss);
    if(session.combo===5){ unlockBadge("combo5"); flashCombo("5連勝!"); }
    if(session.combo===10){ unlockBadge("combo10"); flashCombo("10連勝!"); }

    const rarity = RARITY_BY_LEVEL[lv] || "common";
    const ally = addAlly(isBoss ? "legendary" : rarity);
    setTimeout(()=>flashCombo(`${ally.icon} ${ally.name} が仲間になった!`), isBoss?700:300);

    if(session.mode!=="review"){
      const lstat = getLevelStat(lv); lstat.correct++; lstat.total++;
      if(lstat.correct>=80) unlockBadge("lv"+lv+"_master");
    } else {
      state.wrongPool = state.wrongPool.filter(w=>w.q!==qtext);
    }
  } else {
    fb.classList.add("ng"); fb.classList.remove("ok");
    session.combo = 0; state.streak = 0;
    qstat.wrong++;
    fbText.textContent = (chosenIdx===-1 ? "時間切れ...正解は「" : "敗北...正解は「") + choices[ansIdx] + "」";
    if(session.mode!=="review"){
      const lstat = getLevelStat(lv); lstat.total++;
      const exists = state.wrongPool.some(w=>w.q===qtext);
      if(!exists) state.wrongPool.push({q:qtext, choices, ansIdx, lv});
    }
  }
  saveState();
}

function flashCombo(text){
  const pop = document.getElementById("comboPop");
  pop.textContent = "⚡ "+text; pop.classList.add("show");
  setTimeout(()=>pop.classList.remove("show"), 1300);
}

function nextQuestion(){
  if(session.idx+1 < session.questions.length){ session.idx++; renderQuestion(); }
  else { finishSession(); }
}

function finishSession(){
  newlyUnlocked = [];
  if(!state.badges.includes("first_quiz")) unlockBadge("first_quiz");
  if(session.correctCount === session.questions.length){ unlockBadge("perfect"); setTimeout(()=>confettiBurst(true), 200); }
  saveState();

  document.getElementById("resultScore").textContent = `${session.correctCount}/${session.questions.length}`;
  const acc = Math.round(session.correctCount/session.questions.length*100);
  document.getElementById("resultAcc").textContent = acc+"%";
  document.getElementById("resultXp").textContent = "+"+(session.correctCount*5 + (session.maxCombo>=10?20:session.maxCombo>=5?12:0));
  document.getElementById("resultCombo").textContent = session.maxCombo;

  const area = document.getElementById("badgeUnlockArea");
  area.innerHTML = "";
  newlyUnlocked.forEach(label=>{
    const div = document.createElement("div");
    div.className = "badge-unlock";
    div.innerHTML = `🏆 <span>新しい武功: ${label}</span>`;
    area.appendChild(div);
  });

  showScreen("result");
}

function confirmExit(){ clearInterval(timerInterval); goHome(); }
function goHome(){ showScreen("home"); renderHome(); }

renderHome();
</script>
</body>
</html>
